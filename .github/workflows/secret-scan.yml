name: Secret Scan

# Server-side gitleaks gate. Catches AWS keys, GitHub PATs, SendGrid SG.* tokens,
# Anthropic sk-ant-*, OpenAI sk-*, the bespoke SagePay/SMTP_PASS/JWT_SECRET/DB_PASSWORD
# patterns this repo uses, and the obfuscation markers from the 2026-04-30 incident
# (TRON+Aptos blockchain loader).
#
# Custom rules live in `.gitleaks.toml`.
# Failure here blocks the PR — required-status-check it on `master` branch protection.

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Pinned gitleaks version. Bump deliberately; do not float.
      # Latest stable as of 2026-05-04 was v8.30.1.
      GITLEAKS_VERSION: 8.30.1
    steps:
      - name: Checkout (full history for PR vs base diff)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Fetch enough history to diff against the base ref on PRs.
          # 0 = full history. CI runners have fast network; this is fine.
          fetch-depth: 0

      - name: Install gitleaks (pinned binary download)
        run: |
          set -euo pipefail
          ARCH=x64
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_${ARCH}.tar.gz"
          URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${TARBALL}"
          echo "Downloading $URL"
          curl --fail --silent --show-error --location --retry 3 -o /tmp/gitleaks.tar.gz "$URL"
          # Verify the binary was actually downloaded (not an HTML error page)
          test "$(stat -c%s /tmp/gitleaks.tar.gz)" -gt 1000000 || { echo "::error::gitleaks tarball too small — download failed"; exit 1; }
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (full repo scan, custom config)
        # `detect` scans the git history reachable from HEAD; on a PR this is
        # the merge ref, so anything the PR introduces gets caught.
        # --redact prevents the leaked value from appearing in CI logs.
        # --exit-code 1 makes any finding fail the workflow.
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks-report.sarif

      - name: Upload SARIF report (always)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gitleaks-sarif
          path: gitleaks-report.sarif
          if-no-files-found: ignore
          retention-days: 30
