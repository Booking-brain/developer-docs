name: Dependency Review

# Blocks PRs that introduce known-vulnerable or known-malicious npm dependencies
# (e.g. the chalk/debug/color-name supply-chain wave from late 2025). Uses GitHub's
# advisory database under the hood.
#
# This is a server-side gate. Required-status-check it on master branch protection.

on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write   # so the action can comment with a vulnerability summary

jobs:
  dependency-review:
    name: Review new dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          # Fail the PR on any high-severity or worse vulnerability in *added* deps.
          # Existing deps are left alone — we triage those separately via dependabot.
          fail-on-severity: high
          # License gate: refuse copyleft licenses that would contaminate the proprietary codebase.
          # Adjust the deny-list as needs change.
          deny-licenses: "AGPL-1.0-or-later, AGPL-3.0-or-later, GPL-2.0-or-later, GPL-3.0-or-later, LGPL-2.0-or-later, LGPL-3.0-or-later"
          # Comment a summary on the PR for human review.
          comment-summary-in-pr: on-failure
